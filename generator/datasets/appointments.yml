name: appointments
version: 1
seed: 42

tables:
  - name: appointments
    n_rows: 1000000

    columns:
      - name: appointment_id
        dtype: int
        nullable: false

      - name: patient_id
        dtype: int

      - name: doctor_id
        dtype: int

      - name: appointment_date
        dtype: date

      - name: status
        dtype: category
        values: ["SCHEDULED", "COMPLETED", "CANCELLED", "NO_SHOW"]

      - name: amount
        dtype: float
        nullable: true
